<h2>你希望新 UI 是什么风格？</h2>
<p class="subtitle">选择一个最吸引你的方向</p>

<div class="cards">
  <div class="card" data-choice="minimal" onclick="toggleSelect(this)">
    <div class="card-image" style="background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%); display: flex; align-items: center; justify-content: center; height: 160px;">
      <div style="text-align: center;">
        <div style="width: 80px; height: 80px; border-radius: 50%; background: #1a1a1a; margin: 0 auto; display: flex; align-items: center; justify-content: center;">
          <span style="color: white; font-size: 28px; font-weight: 200;">5/8</span>
        </div>
        <div style="margin-top: 12px; display: flex; gap: 8px; justify-content: center;">
          <div style="width: 40px; height: 40px; border-radius: 50%; border: 2px solid #1a1a1a;"></div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>极简主义</h3>
      <p>黑白灰为主，大量留白，纯粹的数字和简单形状。类似 iOS 原生设计。</p>
    </div>
  </div>

  <div class="card" data-choice="nature" onclick="toggleSelect(this)">
    <div class="card-image" style="background: linear-gradient(135deg, #d4edda 0%, #a8e6cf 100%); display: flex; align-items: center; justify-content: center; height: 160px;">
      <div style="text-align: center;">
        <div style="font-size: 48px; margin-bottom: 8px;">🌱</div>
        <div style="background: rgba(255,255,255,0.7); padding: 8px 16px; border-radius: 20px; font-size: 14px; color: #2d5a27;">5 / 8 杯</div>
        <div style="margin-top: 8px; display: flex; gap: 4px; justify-content: center;">
          <div style="width: 8px; height: 8px; border-radius: 50%; background: #4caf50;"></div>
          <div style="width: 8px; height: 8px; border-radius: 50%; background: #4caf50;"></div>
          <div style="width: 8px; height: 8px; border-radius: 50%; background: #4caf50;"></div>
          <div style="width: 8px; height: 8px; border-radius: 50%; background: #4caf50;"></div>
          <div style="width: 8px; height: 8px; border-radius: 50%; background: #4caf50;"></div>
          <div style="width: 8px; height: 8px; border-radius: 50%; background: #e0e0e0;"></div>
          <div style="width: 8px; height: 8px; border-radius: 50%; background: #e0e0e0;"></div>
          <div style="width: 8px; height: 8px; border-radius: 50%; background: #e0e0e0;"></div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>自然清新</h3>
      <p>绿色植物主题，成长隐喻（种子→大树），温暖柔和的色调。</p>
    </div>
  </div>

  <div class="card" data-choice="neon" onclick="toggleSelect(this)">
    <div class="card-image" style="background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%); display: flex; align-items: center; justify-content: center; height: 160px;">
      <div style="text-align: center;">
        <div style="font-size: 56px; font-weight: 200; color: #00ffff; text-shadow: 0 0 20px #00ffff, 0 0 40px #00ffff;">5</div>
        <div style="color: rgba(255,255,255,0.5); font-size: 12px; margin-top: 4px;">/ 8 GLASSES</div>
        <div style="margin-top: 12px; width: 120px; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-left: auto; margin-right: auto;">
          <div style="width: 62.5%; height: 100%; background: linear-gradient(90deg, #00ffff, #ff00ff); border-radius: 2px; box-shadow: 0 0 10px #00ffff;"></div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>赛博霓虹</h3>
      <p>深色背景 + 霓虹发光效果，科技感十足，适合夜间使用。</p>
    </div>
  </div>

  <div class="card" data-choice="playful" onclick="toggleSelect(this)">
    <div class="card-image" style="background: linear-gradient(135deg, #fff1eb 0%, #ace0f9 100%); display: flex; align-items: center; justify-content: center; height: 160px;">
      <div style="text-align: center;">
        <div style="font-size: 48px; margin-bottom: 8px;">💧</div>
        <div style="display: flex; gap: 6px; justify-content: center;">
          <div style="width: 32px; height: 44px; background: #64b5f6; border-radius: 4px 4px 16px 16px;"></div>
          <div style="width: 32px; height: 44px; background: #64b5f6; border-radius: 4px 4px 16px 16px;"></div>
          <div style="width: 32px; height: 44px; background: #64b5f6; border-radius: 4px 4px 16px 16px;"></div>
          <div style="width: 32px; height: 44px; background: #64b5f6; border-radius: 4px 4px 16px 16px;"></div>
          <div style="width: 32px; height: 44px; background: #64b5f6; border-radius: 4px 4px 16px 16px;"></div>
          <div style="width: 32px; height: 44px; background: #e3f2fd; border-radius: 4px 4px 16px 16px; border: 2px dashed #90caf9;"></div>
          <div style="width: 32px; height: 44px; background: #e3f2fd; border-radius: 4px 4px 16px 16px; border: 2px dashed #90caf9;"></div>
          <div style="width: 32px; height: 44px; background: #e3f2fd; border-radius: 4px 4px 16px 16px; border: 2px dashed #90caf9;"></div>
        </div>
      </div>
    </div>
    <div class="card-body">
      <h3>趣味卡通</h3>
      <p>可爱的水滴图标，彩色杯子阵列，轻松愉快的氛围。</p>
    </div>
  </div>
</div>

<div class="section" style="margin-top: 24px;">
  <p class="label">提示</p>
  <p style="color: #666; font-size: 14px;">点击选择一个风格方向。这只是起点，后续可以进一步定制细节。</p>
</div>
